name: Repobeats Update

on:
  schedule:
    - cron: "0 0 * * *"   # 매일 00:00 UTC (KST 09:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure directory
        run: mkdir -p repobeats/plots

      - name: Download Repobeats SVG
        run: |
          curl -L "https://repobeats.axiom.co/api/embed/b4c6e16d5a126d33f6c5b6f645b38b03ebae3433.svg" \
            -o repobeats/plots/_stats.svg

      - name: Commit updated stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repobeats/plots/_stats.svg
          git commit -m "chore: update repobeats stats" || echo "Nothing to commit"
          git push
