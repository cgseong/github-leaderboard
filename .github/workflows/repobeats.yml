name: Repobeats Update

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Update Repobeats Cards
        # 주소를 amitp/repobeats 로 정확히 수정했습니다.
        uses: amitp/repobeats@v1.0.0
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
