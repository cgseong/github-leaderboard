name: Repobeats Update
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 이 줄이 있어야 수동 실행 버튼이 생깁니다.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Repobeats Cards
        uses: amitp/repobeats@master 
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
