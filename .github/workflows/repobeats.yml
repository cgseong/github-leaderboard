name: Repobeats Update

# 1. 실행 조건 설정
on:
  schedule:
    - cron: "0 0 * * *" # 매일 자동 실행
  workflow_dispatch:   # 수동 실행 버튼 활성화 (중요!)

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # [Step 1] 현재 저장소 코드를 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # [Step 2] Repobeats 그래프 생성 도구 실행
      - name: Update Repobeats Cards
        # 반드시 아래의 공식 도구 주소를 사용해야 합니다. (본인 아이디 입력 금지)
        uses: amitp/repobeats@v1.0.0
        with:
          # 대시보드 이미지 생성을 위한 권한 토큰
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
